user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept        on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log main;

    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;

    client_max_body_size 64M;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    server_tokens off;

    upstream php_fpm {
        server php-fpm:9000;
        keepalive 32;
    }

    server {
        listen 80 default_server;
        server_name _;

        root  /var/www/html;
        index index.php;

        add_header X-Frame-Options          "SAMEORIGIN"                   always;
        add_header X-Content-Type-Options   "nosniff"                      always;
        add_header X-XSS-Protection         "1; mode=block"                always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "geolocation=(), microphone=()" always;

        location = /healthcheck.php {
            access_log  off;
            fastcgi_pass   php_fpm;
            fastcgi_param  SCRIPT_FILENAME /var/www/health/healthcheck.php;
            include        fastcgi_params;
            fastcgi_param  SERVER_SOFTWARE nginx;
            fastcgi_param  SCRIPT_NAME    /healthcheck.php;
        }

        location ~* /(wp-config\.php|php\.ini|\.env|composer\.(json|lock)|readme\.html|license\.txt)$ {
            deny all;
            return 404;
        }

        location ~* /wp-content/uploads/.*\.php$ {
            deny all;
            return 404;
        }

        location ~* /(wp-includes|wp-admin/includes)/.+\.php$ {
            deny all;
            return 404;
        }

        location ~ /\. {
            deny all;
            return 404;
        }

        location ~* \.(htaccess|htpasswd)$ {
            deny all;
            return 404;
        }

        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|avif|mp4|webm)$ {
            expires     30d;
            access_log  off;
            add_header Cache-Control    "public, max-age=2592000, immutable" always;
            add_header X-Frame-Options  "SAMEORIGIN"                         always;
            add_header X-Content-Type-Options "nosniff"                      always;
            try_files $uri =404;
        }

        location / {
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            try_files $uri =404;

            fastcgi_pass   php_fpm;

            include        fastcgi_params;
            fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;

            fastcgi_param  HTTP_HOST        $http_host;
            fastcgi_param  HTTPS            $https if_not_empty;

            fastcgi_buffers          16 16k;
            fastcgi_buffer_size      32k;
            fastcgi_read_timeout     120s;
            fastcgi_connect_timeout  10s;
            fastcgi_send_timeout     120s;

            fastcgi_keep_conn on;
        }
    }
}